@let images = items();
@let selected = selectedIndex();
@let w = width();
@let h = height();

<div class="reel">
  <div class="wrapper">
    @for (image of images; track image.thumbnail; let idx = $index) {
      <button [class.selected]="selected === idx"
              [title]="image.name"
              (click)="imageClicked(image, idx)">
        <img [ngSrc]="image.thumbnail" [width]="w" [height]="h" [alt]="image.alt">
        <span>{{ image.name }}</span>
      </button>
    }
  </div>
</div>

<div class="source-content" #wrapper>
  <ng-content/>
</div>
